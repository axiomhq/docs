name: Generate llms files

# Regenerates llms.txt, llms-full.txt, and llms-apl.mdx whenever docs content
# or the generator script itself changes, then auto-commits any differences.

on:
  push:
    branches:
      - main
    paths:
      - 'docs.json'
      - '**/*.mdx'
      - '**/*.md'
      - 'scripts/generate-llms.ts'
      - 'package.json'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate llms files
        run: npx tsx scripts/generate-llms.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llms.txt llms-full.txt llms-apl.mdx
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate llms files"
            git push
          fi
